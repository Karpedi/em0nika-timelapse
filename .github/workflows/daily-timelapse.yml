name: Daily timelapse

on:
  schedule:
    - cron: "20 4 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: daily-timelapse
  cancel-in-progress: false

jobs:
  timelapse:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install ffmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Create timelapse
        run: python make_timelapse.py

      - name: Commit timelapse
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add README.md timelapse/latest.gif

          git commit -m "Update daily timelapse" || echo "No changes"

          git push

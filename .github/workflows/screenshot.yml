name: Save Emonika snapshot

on:
  schedule:
    - cron: "9 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  snapshot:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Download snapshot
        run: python screenshot.py

      - name: Commit image
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add slike/*.jpg
          git commit -m "Add Emonika snapshot" || echo "No changes"
          git push
